# App-specific overrides for the upstream supabase/supabase docker compose.
#
# Layered onto the stack via:
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.caddy.yml \
#                  -f docker-compose.app.yml up -d
#
# Adds the FastAPI `api` service that drives listing analysis, the Postfix
# container that receives broker emails for the documents pipeline, the
# supabase-db SSL override, and the SPA static-file mount on caddy.

services:
  # ---- supabase-db: enable TLS so the supabase CLI can connect ------------
  # The stock supabase/postgres image ships with ssl=off. `supabase db push`
  # always negotiates TLS first and aborts when the server refuses, so we
  # have to turn it on. The wire is already protected by the SSH tunnel
  # operators use (`ssh -L 5432:localhost:5432 …`), so a self-signed cert
  # is sufficient — sslmode=require accepts any cert.
  #
  # Run deploy/scripts/setup-postgres-tls.sh on the VPS once to populate
  # ./postgres-tls/{server.crt,server.key} with uid 105:106 (the in-container
  # postgres user) and 0600 on the key — postgres refuses to start otherwise.
  db:
    volumes:
      - ./postgres-tls:/etc/postgresql-tls:ro
    # Bind directly to the host's loopback on 5433 so `supabase db push`
    # (over an SSH tunnel) can reach the db without going through the
    # supabase-pooler service, which owns host port 5432 and does not
    # speak TLS. Loopback-bound — never exposed publicly.
    ports:
      - "127.0.0.1:5433:5432"
    command:
      [
        "postgres",
        "-c",
        "config_file=/etc/postgresql/postgresql.conf",
        "-c",
        "log_min_messages=fatal",
        "-c",
        "ssl=on",
        "-c",
        "ssl_cert_file=/etc/postgresql-tls/server.crt",
        "-c",
        "ssl_key_file=/etc/postgresql-tls/server.key"
      ]

  # ---- FastAPI api service ------------------------------------------------
  api:
    build:
      # The api/ tree must be rsynced to /opt/supabase-stack/api/ on the
      # server before bringing the stack up. See deploy/scripts/deploy-api.sh.
      context: ./api
      dockerfile: Dockerfile
    image: boliganalyse-api:latest
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_started
    environment:
      # Reach Supabase via the internal docker network rather than the public
      # Caddy hostname — fewer hops, no TLS handshake, no DNS lookup.
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-16000}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      ENABLE_DST_TOOLS: ${ENABLE_DST_TOOLS:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Shared with the postfix container so the inbound-email webhook can
      # verify Postfix's X-Inbound-Secret header. Both services read the
      # same value from /opt/supabase-stack/.env.
      INBOUND_EMAIL_SECRET: ${INBOUND_EMAIL_SECRET}
    # No host port mapping — the in-network Caddy reaches the api
    # service via docker DNS at http://api:8000. Keeping the API off the
    # host loopback also limits the blast radius if the box is compromised.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status==200 else sys.exit(1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- Inbound mail receiver (Postfix) ------------------------------------
  # Receives mail addressed to `*@inbox.boliganalyse.ai` and pipes each
  # accepted message to the FastAPI webhook over the in-network docker DNS
  # name `api`. SMTP doesn't go through Caddy — port 25 is exposed directly
  # on the host. See deploy/scripts/setup-postfix.sh for TLS cert + DNS
  # setup before bringing this service up.
  postfix:
    build:
      context: ./postfix
      dockerfile: Dockerfile
    image: boliganalyse-postfix:latest
    restart: unless-stopped
    ports:
      - "25:25"
    environment:
      INBOUND_WEBHOOK_URL: ${INBOUND_WEBHOOK_URL:-http://api:8000/webhooks/inbound-email}
      INBOUND_EMAIL_SECRET: ${INBOUND_EMAIL_SECRET}
    volumes:
      # Operator runs setup-postfix.sh which symlinks Let's Encrypt's live
      # certs into ${POSTFIX_TLS_CERT_DIR} (default
      # /opt/supabase-stack/postfix-tls). Mount read-only.
      - ${POSTFIX_TLS_CERT_DIR:-./postfix-tls}:/etc/postfix/tls:ro
    depends_on:
      api:
        condition: service_healthy

  # ---- Static frontend served by the supabase-bundled Caddy ---------------
  # The built SPA at ./volumes/frontend/ is mounted read-only into the caddy
  # container. The matching `dev.<domain>` block in the Caddyfile points at
  # /var/www/app — see deploy/Caddyfile.example.
  caddy:
    volumes:
      - ./volumes/frontend:/var/www/app:ro

  # ---- Legacy edge-function service (no code; container kept for compose
  # health) ----------------------------------------------------------------
  # The Deno edge function was deleted when the FastAPI api took over, but
  # the upstream supabase compose still defines a `functions:` service. We
  # leave it here with DST tools OFF (a leftover from when the edge runtime
  # ran the analysis chain — DST + a 60s wall-clock made it fragile). Safe
  # to remove once we're sure no caller hits the legacy path.
  functions:
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-unused}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_DST_TOOLS: "false"
